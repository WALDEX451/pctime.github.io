<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Time Sign Up</title>
    <style>
        :root {
            --bg-start: #f7f9fc;
            --bg-end: #e9eef8;
            --card-bg: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0b63f6;
            --primary-hover: #0956d4;
            --ring: rgba(11, 99, 246, 0.18);
            --border: #d5deea;
            --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
        }

        .page {
            width: 100%;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .menu {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: 100%;
            padding: 16px 28px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .brand {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.03em;
        }

        .menu-links {
            display: flex;
            flex: 1;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .menu-link {
            display: inline-flex;
            justify-content: center;
            min-width: 120px;
            padding: 10px 16px;
            border: 1px solid rgba(11, 99, 246, 0.08);
            border-radius: 999px;
            background: #f8fbff;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: transform 140ms ease, background-color 140ms ease, color 140ms ease, border-color 140ms ease;
        }

        .menu-link:hover {
            background: #edf3ff;
            color: var(--primary);
            border-color: rgba(11, 99, 246, 0.16);
            transform: translateY(-1px);
        }

        .sign-up {
            width: min(100% - 48px, 420px);
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.6rem;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .field {
            margin-bottom: 16px;
        }

        label {
            display: inline-block;
            margin-bottom: 6px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 0.96rem;
            background: #fff;
            transition: border-color 140ms ease, box-shadow 140ms ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--ring);
        }

        button {
            width: 100%;
            margin-top: 6px;
            border: 0;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.98rem;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
            transition: background-color 140ms ease, transform 140ms ease;
        }

        button:disabled {
            background: #9db7ea;
            cursor: not-allowed;
            transform: none;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled:hover {
            background: #9db7ea;
        }

        button:active {
            transform: translateY(1px);
        }

        .error {
            min-height: 18px;
            margin: 6px 0 0;
            color: #b42318;
            font-size: 0.84rem;
        }

        .switch-text {
            margin: 18px 0 0;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .switch-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .switch-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .menu {
                align-items: flex-start;
                padding: 18px;
            }

            .menu-links {
                width: 100%;
                justify-content: stretch;
            }

            .menu-link {
                flex: 1 1 100%;
                min-width: 0;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .sign-up {
                width: calc(100% - 36px);
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <nav class="menu" aria-label="Main menu">
            <h2 class="brand">Computer Time</h2>
            <div class="menu-links">
                <a class="menu-link" href="index.html">Home</a>
                <a class="menu-link" href="about.html">About</a>
                <a class="menu-link" href="time.html">Timeline</a>
                <a class="menu-link" href="toekomst.html">Future</a>
                <a class="menu-link" href="AIchat.html">AI Chat</a>
                <a class="menu-link" href="login.html">Logout</a>
            </div>
        </nav>

        <form class="sign-up" id="signup-form" aria-label="Sign up form" novalidate>
            <h1>Sign up</h1>
            <p class="subtitle">Create your account to continue.</p>

            <div class="field">
                <label for="username">Username</label>
                <input id="username" type="text" autocomplete="username" minlength="3" required>
                <p id="username-error" class="error"></p>
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <input id="email" type="email" autocomplete="email" required>
                <p id="email-error" class="error"></p>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="new-password" minlength="8" required>
                <p id="password-error" class="error"></p>
            </div>

            <div class="field">
                <label for="confirm-password">Confirm password</label>
                <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
                <p id="confirm-password-error" class="error"></p>
            </div>

            <button id="submit-button" type="submit" disabled>Create Account</button>
            <p class="switch-text">Already have an account? <a href="login.html">Sign in</a></p>
        </form>
    </div>

    <script>
        const form = document.getElementById("signup-form");
        const usernameInput = document.getElementById("username");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const confirmPasswordInput = document.getElementById("confirm-password");
        const usernameError = document.getElementById("username-error");
        const emailError = document.getElementById("email-error");
        const passwordError = document.getElementById("password-error");
        const confirmPasswordError = document.getElementById("confirm-password-error");
        const submitButton = document.getElementById("submit-button");

        function validateUsername() {
            if (usernameInput.validity.valueMissing) {
                usernameError.textContent = "Username is required.";
                return false;
            }

            if (usernameInput.validity.tooShort) {
                usernameError.textContent = "Username must be at least 3 characters.";
                return false;
            }

            usernameError.textContent = "";
            return true;
        }

        function validateEmail() {
            if (emailInput.validity.valueMissing) {
                emailError.textContent = "Email is required.";
                return false;
            }

            if (emailInput.validity.typeMismatch) {
                emailError.textContent = "Enter a valid email address.";
                return false;
            }

            emailError.textContent = "";
            return true;
        }

        function validatePassword() {
            if (passwordInput.validity.valueMissing) {
                passwordError.textContent = "Password is required.";
                return false;
            }

            if (passwordInput.validity.tooShort) {
                passwordError.textContent = "Password must be at least 8 characters.";
                return false;
            }

            passwordError.textContent = "";
            return true;
        }

        function validateConfirmPassword() {
            if (confirmPasswordInput.validity.valueMissing) {
                confirmPasswordError.textContent = "Please confirm your password.";
                return false;
            }

            if (confirmPasswordInput.value !== passwordInput.value) {
                confirmPasswordError.textContent = "Passwords do not match.";
                return false;
            }

            confirmPasswordError.textContent = "";
            return true;
        }

        function updateFormState() {
            const usernameValid = validateUsername();
            const emailValid = validateEmail();
            const passwordValid = validatePassword();
            const confirmPasswordValid = validateConfirmPassword();

            submitButton.disabled = !(usernameValid && emailValid && passwordValid && confirmPasswordValid);
        }

        usernameInput.addEventListener("input", updateFormState);
        emailInput.addEventListener("input", updateFormState);
        passwordInput.addEventListener("input", updateFormState);
        confirmPasswordInput.addEventListener("input", updateFormState);

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            updateFormState();

            if (!submitButton.disabled) {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
