<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        :root {
            --bg-start: #f7f9fc;
            --bg-end: #e9eef8;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0b63f6;
            --primary-hover: #0956d4;
            --border: #d5deea;
            --shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            color: var(--text);
        }

        .page {
            width: 100%;
            min-height: 100vh;
        }

        .menu {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: 100%;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .brand {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.03em;
        }

        .menu-links {
            display: flex;
            flex: 1;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .menu-link {
            display: inline-flex;
            justify-content: center;
            min-width: 120px;
            padding: 10px 16px;
            border: 1px solid rgba(11, 99, 246, 0.08);
            border-radius: 999px;
            background: #f8fbff;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: transform 140ms ease, background-color 140ms ease, color 140ms ease, border-color 140ms ease;
        }

        .menu-link:hover {
            background: #edf3ff;
            color: var(--primary);
            border-color: rgba(11, 99, 246, 0.16);
            transform: translateY(-1px);
        }

        .chat-frame {
            width: 100%;
            height: calc(100vh - 81px);
            padding: 16px;
        }

        #voiceflow-chat {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .status {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%);
            z-index: 10;
            max-width: min(92vw, 760px);
            padding: 12px 16px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.78);
            color: #fff;
            font-size: 0.92rem;
            text-align: center;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.16);
        }

        @media (max-width: 700px) {
            .menu {
                align-items: flex-start;
                padding: 18px;
            }

            .menu-links {
                width: 100%;
                justify-content: stretch;
            }

            .menu-link {
                flex: 1 1 100%;
                text-align: center;
                min-width: 0;
            }

            .chat-frame {
                height: calc(100vh - 214px);
            }

            .status {
                font-size: 0.86rem;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <nav class="menu" aria-label="Main menu">
            <h2 class="brand">Computer Time</h2>
            <div class="menu-links">
                <a class="menu-link" href="index.html">Home</a>
                <a class="menu-link" href="about.html">About</a>
                <a class="menu-link" href="time.html">Timeline</a>
                <a class="menu-link" href="toekomst.html">Future</a>
                <a class="menu-link" href="AIchat.html">AI Chat</a>
                <a class="menu-link" href="login.html">Logout</a>
            </div>
        </nav>

        <main class="chat-frame">
            <div id="voiceflow-chat" aria-label="chatbot"></div>
        </main>

        <div id="chat-status" class="status">De chatbot wordt geladen...</div>
    </div>

    <script type="text/javascript">
        const projectId = "69b570d85775917f733fecb5";
        const statusElement = document.getElementById("chat-status");

        function setStatus(message, isError) {
            statusElement.textContent = message;
            statusElement.style.background = isError ? "rgba(127, 29, 29, 0.9)" : "rgba(15, 23, 42, 0.78)";
        }

        (function (documentRef, tagName) {
            const script = documentRef.createElement(tagName);
            const firstScript = documentRef.getElementsByTagName(tagName)[0];

            script.onload = function () {
                window.voiceflow.chat.load({
                    verify: {
                        projectID: projectId
                    },
                    url: "https://general-runtime.voiceflow.com",
                    versionID: "production",
                    render: {
                        mode: "embedded",
                        target: document.getElementById("voiceflow-chat")
                    },
                    assistant: {
                        title: "Computer Time AI"
                    }
                });

                setStatus("De chatbot is klaar om te gebruiken.", false);
                window.setTimeout(() => {
                    statusElement.style.display = "none";
                }, 1800);
            };

            script.onerror = function () {
                setStatus("De chatbot kon niet laden. Controleer je internetverbinding en probeer opnieuw.", true);
            };

            script.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs";
            script.type = "text/javascript";
            firstScript.parentNode.insertBefore(script, firstScript);
        })(document, "script");
    </script>
</body>
</html>
